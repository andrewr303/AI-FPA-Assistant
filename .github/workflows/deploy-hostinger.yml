name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # Bundle PHP API alongside the static dist so a single FTP push deploys both.
      - name: Stage PHP API into dist
        run: |
          mkdir -p dist/api
          mkdir -p dist/api/ground-truth
          cp php-api/copilot.php dist/api/
          cp php-api/.htaccess dist/api/
          cp ai-knowledge/ground-truth/nooks-ground-truth.md dist/api/ground-truth/

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          server-dir: ${{ secrets.HOSTINGER_FTP_DIR }}
          local-dir: ./dist/
          # Mirror dist/ exactly. Removes stale per-route subdirectories left
          # behind by the old TanStack Start (SSR) build (e.g. /treasury/,
          # /signal-desk/) which otherwise shadow the SPA index.html fallback
          # and serve broken pages with dead asset references.
          # Safe: PHP API is staged into dist/api/ above, so it ships every push.
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
